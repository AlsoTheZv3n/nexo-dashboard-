name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dashboard_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test -d dashboard_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Restore
        run: dotnet restore backend/Dashboard.sln
      - name: Build
        run: dotnet build backend/Dashboard.sln --no-restore -c Release
      - name: Test
        run: dotnet test backend/Dashboard.sln --no-build -c Release --logger trx --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: "**/TestResults/**"

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint || true   # relax until eslint is fully wired
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build

  pwsh:
    name: PowerShell (Pester)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck
          Invoke-Pester -CI -Path powershell/tests

  kustomize:
    name: k8s manifests lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        run: |
          curl -sLo kubectl https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
      - name: Render overlays
        run: |
          kubectl kustomize k8s/overlays/dev > /tmp/dev.yaml
          kubectl kustomize k8s/overlays/prod > /tmp/prod.yaml
          kubectl kustomize k8s/observability > /tmp/obs.yaml
          test -s /tmp/dev.yaml && test -s /tmp/prod.yaml && test -s /tmp/obs.yaml

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # E2E is informational: a flaky browser run shouldn't block a merge.
    # Unit + integration + lint already gated the change at this point.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Boot the dev stack
        run: docker compose -f docker-compose.dev.yml up -d --build
      - name: Wait for the API + frontend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/ >/dev/null \
               && curl -fsS http://localhost:5000/api/v1/health/ready >/dev/null; then
              echo "Stack is up."
              exit 0
            fi
            echo "waiting (attempt $i)…"; sleep 5
          done
          echo "::error::Stack never came up"
          docker compose -f docker-compose.dev.yml logs --tail=200 || true
          exit 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install + Playwright browsers
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  security-deps:
    name: Vulnerable dependencies (dotnet + pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: dotnet restore
        run: dotnet restore backend/Dashboard.sln
      - name: dotnet list vulnerable (fails on high/critical)
        run: |
          set -e
          out=$(dotnet list backend/Dashboard.sln package --vulnerable --include-transitive 2>&1 || true)
          echo "$out"
          if echo "$out" | grep -Ei 'high|critical'; then
            echo "::error::High or critical vulnerability found in .NET packages"
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: pnpm audit (prod only, fails on high+)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --prod --audit-level=high

  security-images:
    name: Trivy scan (built images)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (local tag only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          tags: dashboard-api:ci
          push: false
          load: true

      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          tags: dashboard-frontend:ci
          push: false
          load: true

      - name: Trivy scan API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dashboard-api:ci
          format: sarif
          output: trivy-api.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dashboard-frontend:ci
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .
