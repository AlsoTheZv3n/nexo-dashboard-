# Copy to postgres-secret.yaml (gitignored) and replace with real values, or create
# imperatively: `kubectl -n dashboard create secret generic postgres-secret --from-literal=...`
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: dashboard
  POSTGRES_PASSWORD: CHANGE_ME
  POSTGRES_DB: dashboard
