# Daily pg_dump to a PVC — offsite sync happens out-of-band (restic → S3/Backblaze).
# Restore playbook lives in docs/RUNBOOK.md.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-backups
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
spec:
  schedule: "0 2 * * *"      # 02:00 UTC daily
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              env:
                - name: PGHOST
                  value: postgres
                - name: PGPORT
                  value: "5432"
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_DB
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_USER
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  ts=$(date -u +%Y%m%d-%H%M%S)
                  file=/backups/dashboard-${ts}.sql.gz
                  pg_dump --format=plain --no-owner --no-privileges | gzip -9 > "$file"
                  echo "Wrote $file ($(du -h "$file" | cut -f1))"
                  # Retain last 14 successful dumps locally; offsite sync is a separate CronJob
                  ls -1t /backups/dashboard-*.sql.gz | tail -n +15 | xargs -r rm --
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: db-backups
