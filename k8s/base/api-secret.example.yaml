# Copy to api-secret.yaml (gitignored) and replace with real values, or create
# imperatively: `kubectl -n dashboard create secret generic api-secret --from-literal=...`
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
type: Opaque
stringData:
  ConnectionStrings__Default: "Host=postgres;Port=5432;Database=dashboard;Username=dashboard;Password=CHANGE_ME"
  Jwt__SigningKey: "CHANGE_ME_minimum_32_bytes_of_entropy_xxxxxx"
