apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dashboard-dev

resources:
  - ../../base

# Create dev secrets inline so `kubectl apply -k overlays/dev` just works.
# Prod uses its own process (see overlays/prod/README.md).
secretGenerator:
  - name: postgres-secret
    literals:
      - POSTGRES_USER=dashboard
      - POSTGRES_PASSWORD=dev
      - POSTGRES_DB=dashboard
  - name: api-secret
    literals:
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=dashboard;Username=dashboard;Password=dev
      - Jwt__SigningKey=dev_only_signing_key_min_32_chars_xxxxxxxxxx

images:
  - name: ghcr.io/nexo-dashboard/api
    newTag: dev
  - name: ghcr.io/nexo-dashboard/frontend
    newTag: dev

patches:
  - target:
      kind: Ingress
      name: dashboard
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dashboard.localtest.me
