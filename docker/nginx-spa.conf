server {
    listen       8080 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # /api/* — proxy to the API container.
    #
    # In docker-compose we resolve "api" via Docker's embedded DNS. In k8s the
    # Ingress fields /api before this pod sees it, so this block is a harmless
    # fallback there. Override the upstream by templating /etc/nginx/conf.d/
    # in production if you ever hit this code path with a different DNS name.
    location /api/ {
        resolver 127.0.0.11 valid=10s;          # docker DNS
        set $api_upstream http://api:8080;
        proxy_pass         $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entry HTML
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Long cache for content-hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
