server {
    listen       8080 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entry HTML
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Long cache for content-hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Let the API be served by a different upstream (cluster-side or external Nginx).
    # In the cluster we don't proxy /api here — the ingress in front of this pod does it.
}
