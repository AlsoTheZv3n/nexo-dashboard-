# External Nginx (on the VM) that fronts k3s.
#
# Assumes:
#   - k3s Traefik (or our Ingress) listening on NodePort 30080
#   - certbot has written /etc/letsencrypt/live/<host>/…
#   - DNS A-record pointing at the VM's public IP

# Redirect all HTTP to HTTPS
server {
    listen      80;
    listen      [::]:80;
    server_name dashboard.example.ch;

    # ACME challenge (certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name dashboard.example.ch;

    ssl_certificate     /etc/letsencrypt/live/dashboard.example.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.example.ch/privkey.pem;

    # Modern-ish TLS profile
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Hard upload cap
    client_max_body_size 2m;

    # Forward everything to the k3s ingress on NodePort 30080.
    # The ingress routes /api to the API service and / to the frontend static pod.
    location / {
        proxy_pass         http://127.0.0.1:30080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
